services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: maat-postgres
    environment:
      POSTGRES_USER: maat
      POSTGRES_PASSWORD: maat
      POSTGRES_DB: maat
    ports:
      - "5432:5432"
    volumes:
      - maat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maat"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    container_name: maat-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - maat_natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # cat-cafe (#32) — LLM observability + eval sink. Opt-in: `make obs-up` (profile "obs").
  # Point the pipeline at it with OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318.
  cat-cafe:
    image: artiumai/cat-cafe:latest
    container_name: maat-catcafe
    profiles: ["obs"]
    restart: unless-stopped
    ports:
      - "8800:8000"   # UI (the reader owns 8000 in dev)
      - "4318:4318"   # OTLP / HTTP

volumes:
  maat_pgdata:
  maat_natsdata:
