services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: maat-postgres
    environment:
      POSTGRES_USER: maat
      POSTGRES_PASSWORD: maat
      POSTGRES_DB: maat
    ports:
      - "5432:5432"
    volumes:
      - maat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maat"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    container_name: maat-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - maat_natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  maat_pgdata:
  maat_natsdata:
