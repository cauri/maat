services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: maat-postgres
    environment:
      POSTGRES_USER: maat
      POSTGRES_PASSWORD: maat
      POSTGRES_DB: maat
    ports:
      - "5432:5432"
    volumes:
      - maat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maat"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  maat_pgdata:
