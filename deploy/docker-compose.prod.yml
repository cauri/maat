# Maat deploy-test stack: the infra baseline (Postgres+pgvector + NATS JetStream).
# No public ports — services talk over the compose network; we verify from on-box.
services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maat}
      POSTGRES_DB: ${POSTGRES_DB:-maat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maat}"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  reader:
    build: ./python
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-maat}:${POSTGRES_PASSWORD:-maat}@postgres:5432/${POSTGRES_DB:-maat}"
      # The admin console (P8, #82) publishes corrections to NATS; without this the reader
      # hit localhost:4222 and crash-looped. Point it at the compose nats service.
      NATS_URL: "nats://nats:4222"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

volumes:
  pgdata:
  natsdata:
