# Maat prod stack: the full live pipeline + serving, fronted by Caddy for TLS.
#
#   postgres + nats        — canonical store + bus
#   kerneld                — the deterministic spine (single writer): folds events → projections,
#                            and applies the embedded migrations on startup
#   agents                 — extract + classify (long-running NATS subscribers; LLM judgement)
#   acquisition-clock      — scheduled tick: acquire new articles → drain → corroborate (recompute
#                            clusters). Cadence is operator-chosen via MAAT_TICK_INTERVAL.
#   reader                 — the FastAPI app: public /api/* (incl. /api/v2 feed + image proxy) and
#                            the loopback-only admin console
#   marketing              — the public landing page (www.maat.press) + acquisition funnel; a
#                            SEPARATE app from the reader, loopback-only, fronted by Caddy
#   cat-cafe               — OTLP sink: LLM spans (token usage = spend), admin-only UI on :8800
#   caddy                  — the public edge (80/443): /api/* at api.*, the console at admin.* (WG-
#                            gated), and the marketing site at www.maat.press (see Caddyfile)
#
# The reader is bound to 127.0.0.1, so the operator/admin console is reachable only via an SSH
# tunnel — never the open net. Secrets (ANTHROPIC_API_KEY, MISTRAL_API_KEY, APIFY_API_KEY) live in
# .env next to this file and are loaded into the pipeline services via env_file.
services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-maat}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-maat}
      POSTGRES_DB: ${POSTGRES_DB:-maat}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-maat}"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # The deterministic spine (D20): the single writer over Postgres. Consumes maat.events.>,
  # appends to the events log, folds projections (articles/claims/clusters), and runs the
  # embedded sqlx migrations on startup — including 0008 (articles.image_url).
  kerneld:
    build: ./rust
    image: maat-kerneld:local
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-maat}:${POSTGRES_PASSWORD:-maat}@postgres:5432/${POSTGRES_DB:-maat}"
      NATS_URL: "nats://nats:4222"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # Extract + classify: long-running bus subscribers that call the LLM (BRIEF §5.1-5.3).
  # Reuses the reader image (maat-app:local, built by the reader service); only the command differs.
  agents:
    image: maat-app:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-maat}:${POSTGRES_PASSWORD:-maat}@postgres:5432/${POSTGRES_DB:-maat}"
      NATS_URL: "nats://nats:4222"
      # LLM spans (model + token usage = spend) → cat-cafe. No-op if cat-cafe is down.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://cat-cafe:4318"
    command: ["uv", "run", "--no-dev", "python", "-m", "maat.agents"]
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      kerneld:
        condition: service_started

  # Ingestion clock (#34): one tick = acquire new articles (GDELT, free) → wait for extract+classify
  # to drain → corroborate (recompute clusters). clock.py is intentionally single-pass; this service
  # is the scheduler wrapper. Cadence is the operator's choice via MAAT_TICK_INTERVAL. A paused clock
  # (admin.clock.set) skips the acquire step. MAAT_PRIMARY_PASS=0 keeps the recurring job free
  # (GDELT only); set it to 1 to add Apify primary-source enrichment per tick (costs credits).
  acquisition-clock:
    image: maat-app:local
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-maat}:${POSTGRES_PASSWORD:-maat}@postgres:5432/${POSTGRES_DB:-maat}"
      NATS_URL: "nats://nats:4222"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://cat-cafe:4318"   # corroborate/extremity LLM spend → cat-cafe
      # Operator-tunable. Topics drive what gets acquired; cadence drives cost.
      MAAT_TOPICS: ${MAAT_TOPICS:-global politics,artificial intelligence,new technology emerging,scientific discovery,art,worldwide entertainment,fun and laughter}
      MAAT_TICK_INTERVAL: ${MAAT_TICK_INTERVAL:-10800}   # 3h between ticks
      MAAT_TICK_DRAIN: ${MAAT_TICK_DRAIN:-180}           # let extract+classify catch up before corroborate
      # Apify primary-source enrichment ON (cauri): each tick adds an Apify pass for issuers' own
      # releases the GDELT news stream misses. Costs credits per call. Spend is reported to the
      # operator and (follow-up) surfaced in the admin console. Set to 0 to pause.
      MAAT_PRIMARY_PASS: ${MAAT_PRIMARY_PASS:-1}
      # LLM refinement paths ON (cauri sign-off, #189). These run on SONNET (cauri: quality over
      # the cheap tier) — one call per cluster (NER) / per feedback item (triage) / per unplaced
      # cluster (geo), with the deterministic heuristic/rule pass as the fallback on any error.
      # Spend → cat-cafe via OTLP. Set any to 0 to fall back to the pure heuristic/rule path.
      MAAT_STORY_GRAPH_LLM: ${MAAT_STORY_GRAPH_LLM:-1}   # canonical entity spine for thread attachment (#42)
      MAAT_TRIAGE_LLM: ${MAAT_TRIAGE_LLM:-1}             # feedback category/route refinement (#58/#189)
      MAAT_CURATION_LLM: ${MAAT_CURATION_LLM:-1}         # geo-tag clusters the TLD/lang heuristic can't place (#189)
      MAAT_GROUNDING_LLM: ${MAAT_GROUNDING_LLM:-1}       # judge each primary-bearing cluster vs its primary source (#228)
      MAAT_CONTRADICTION_NLI: ${MAAT_CONTRADICTION_NLI:-1}  # NLI contradiction detection (#229): pinned + smoke-tested ONNX MNLI cross-encoder
      MAAT_NLI_MODEL: ${MAAT_NLI_MODEL:-Xenova/distilbert-base-uncased-mnli}  # small DistilBERT-MNLI in ONNX (#229), downloaded once per deploy
    # NOTE: $$VAR (doubled) escapes compose's own parse-time substitution so the *container* shell
    # evaluates these against its environment at runtime. A single ${VAR} here would be substituted
    # by compose against the host env (unset → blank), breaking `sleep ""`.
    command:
      - sh
      - -c
      - |
        while true; do
          echo "[clock] tick: acquire (topics: $${MAAT_TOPICS})";
          uv run --no-dev python scripts/clock.py || echo "[clock] acquire error";
          echo "[clock] acquire-rss (balanced multipolar outlet feeds, #238)";
          uv run --no-dev python scripts/acquire_rss.py || echo "[clock] rss error";
          echo "[clock] draining $${MAAT_TICK_DRAIN}s for extract+classify";
          sleep "$${MAAT_TICK_DRAIN}";
          echo "[clock] corroborate (recompute clusters)";
          uv run --no-dev python -m maat.agents.corroborate_agent || echo "[clock] corroborate error";
          echo "[clock] story-graph (thread clusters into event-nodes, #42)";
          uv run --no-dev python -m maat.agents.story_graph_agent || echo "[clock] story-graph error";
          echo "[clock] geotag (infer country for clusters the heuristic can't place, #189)";
          uv run --no-dev python -m maat.agents.geotag_agent || echo "[clock] geotag error";
          echo "[clock] grounding (judge primary-bearing clusters vs their primary source, #228)";
          uv run --no-dev python -m maat.agents.grounding_agent || echo "[clock] grounding error";
          echo "[clock] contradiction (NLI between a claim and its nearest neighbours, #229)";
          uv run --no-dev python -m maat.agents.contradiction_agent || echo "[clock] contradiction error";
          echo "[clock] harvest (snapshot clusters for truth-over-time, #39)";
          uv run --no-dev python scripts/harvest.py || echo "[clock] harvest error";
          echo "[clock] triage (route submitted feedback to review/auto-fix, #58)";
          uv run --no-dev python -m maat.agents.triage || echo "[clock] triage error";
          echo "[clock] file-issues (auto-fix feedback -> tracked issues, #214)";
          uv run --no-dev python -m maat.serving.issue_filing || echo "[clock] issue-filing error";
          echo "[clock] tick done; sleeping $${MAAT_TICK_INTERVAL}s";
          sleep "$${MAAT_TICK_INTERVAL}";
        done
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      kerneld:
        condition: service_started
      agents:
        condition: service_started

  reader:
    build: ./python
    image: maat-app:local
    restart: unless-stopped
    # Same .env as the pipeline services: the "Run the pipeline" button (Activity) shells out to
    # the acquire + corroborate jobs, so the reader needs MAAT_TOPICS / APIFY_API_KEY / etc. too.
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-maat}:${POSTGRES_PASSWORD:-maat}@postgres:5432/${POSTGRES_DB:-maat}"
      # The admin console (P8, #82) publishes corrections to NATS; without this the reader
      # hit localhost:4222 and crash-looped. Point it at the compose nats service.
      NATS_URL: "nats://nats:4222"
      # The console's prompt-chat agent (#158) — and any console-side LLM/embedding calls — read
      # these from the box's .env (same place POSTGRES_* come from). Values never touch the repo;
      # without them the chat degrades to "unavailable" rather than crashing.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MISTRAL_API_KEY: "${MISTRAL_API_KEY:-}"
      # Personal-feed topic enrichment ON (cauri sign-off, #189): ?topics= expands each interest
      # via SONNET (cauri: quality over the cheap tier), MEMOISED per interest so it's one call per
      # new interest, not per request (serving.topics.enriched_interest). Set to 0 → pure keyword filter.
      MAAT_TOPICS_LLM: "${MAAT_TOPICS_LLM:-1}"
      # Daily spend cap for operator-triggered pipeline runs (#195, cauri: default $5/day). The
      # console refuses to start a run once today's estimated LLM spend reaches this; set to 0 to
      # disable the gate (uncapped).
      MAAT_DAILY_CAP_USD: "${MAAT_DAILY_CAP_USD:-5}"
      # So translate + prompt-chat spans export, and /eval shows "receiving traces" + cat-cafe link.
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://cat-cafe:4318"
      # Admin-console auth (P8, #163; D31/D32) — Google OIDC + allowlist, SEPARATE from user auth.
      # All empty by default → admin auth stays DISABLED (console unauthenticated) until these land
      # in the box .env. Set them there (never in the repo); MAAT_ADMIN_SESSION_SECRET=$(openssl rand -hex 32).
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      MAAT_ADMIN_EMAILS: "${MAAT_ADMIN_EMAILS:-}"
      MAAT_ADMIN_SESSION_SECRET: "${MAAT_ADMIN_SESSION_SECRET:-}"
      MAAT_ADMIN_REDIRECT_URI: "${MAAT_ADMIN_REDIRECT_URI:-https://admin.maat.press/admin/callback}"
      MAAT_ADMIN_HD: "${MAAT_ADMIN_HD:-}"
    # Loopback only: host-network Caddy reaches it at 127.0.0.1:8000; the host port is bound to
    # 127.0.0.1 for SSH-tunnel break-glass. NOT published to the internet (closes the open :8000).
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy

  # Public marketing site (www.maat.press): the landing page + the acquisition funnel. A SEPARATE
  # app from the behind-the-box reader/console — they share only the bus + DB. It publishes
  # acquisition.* events (tenant_id=public) that maat-kerneld folds for the console's /acquisition
  # page; it never touches Postgres directly, so it needs only NATS (no DB, no LLM keys, no OTEL).
  # Reuses the maat-app:local image the reader builds. Bound to 127.0.0.1:8080 so the host-network
  # Caddy reaches it over the loopback (www.maat.press vhost) — never published to the open net.
  marketing:
    image: maat-app:local
    restart: unless-stopped
    environment:
      NATS_URL: "nats://nats:4222"
    command: ["uv", "run", "--no-dev", "uvicorn", "maat.marketing.app:app", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      nats:
        condition: service_healthy

  # cat-cafe (#32) — LLM observability + spend sink. The pipeline exports OTLP spans here (model +
  # token usage per call → cost). UI is admin-only on loopback (reach it like the reader console,
  # via `ssh -L 8800:localhost:8800`); OTLP :4318 stays internal on the compose network. The
  # console's /eval page links to it ("open cat-cafe ↗", CATCAFE_URL default http://localhost:8800).
  cat-cafe:
    image: artiumai/cat-cafe:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8800:8000"   # UI — SSH-tunnel only, never public
    volumes:
      # Persist the Badger trace store (spend history) across redeploys — without this, every
      # merge-to-main recreates the container and resets the spend view to zero.
      - catcafedata:/app/data

  caddy:
    image: caddy:2
    restart: unless-stopped
    # HOST networking (not published ports): so the admin vhost's `remote_ip` matcher sees the
    # real WireGuard source IP (a bridge + port-map would masquerade it to the docker gateway).
    # Caddy binds the host's :80/:443 directly — including on the wg0 interface (10.8.0.1).
    network_mode: host
    environment:
      # Public API hostname — a real domain whose A-record points at this box (api.maat.press).
      MAAT_HOST: ${MAAT_HOST:?set MAAT_HOST to the public API hostname (e.g. api.maat.press)}
      # Operator-console hostname (public A-record + WG-gated serving, D32) and the WG subnet
      # the console is served to. Defaults match deploy/wireguard.sh.
      MAAT_ADMIN_HOST: ${MAAT_ADMIN_HOST:-admin.maat.press}
      MAAT_WG_SUBNET: ${MAAT_WG_SUBNET:-10.8.0.0/24}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - reader
      - marketing

volumes:
  pgdata:
  natsdata:
  caddydata:
  caddyconfig:
  catcafedata:
