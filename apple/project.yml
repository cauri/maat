# XcodeGen project for the Maat Apple client (P6, issue #6).
# Regenerate the .xcodeproj with:  cd apple && xcodegen generate
#
# One universal SwiftUI target for iPhone + Mac (PLAN §2.1 Tier 2 / §8 P6). Min OS is 26.0 so
# Foundation Models, Translation, and SwiftData are all present while keeping reach wide; the
# app still builds against the iOS 27 SDK (Xcode 27).
name: Maat
options:
  bundleIdPrefix: dev.cauri.maat
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  defaultConfig: Debug

settings:
  base:
    # Swift 5 language mode for now: the iOS 26/27 Translation framework's `TranslationSession`
    # (non-Sendable + @concurrent `translate`) can't be driven from the main-actor `.translationTask`
    # closure under Swift 6 strict concurrency. The code is otherwise Swift-6-clean; revisit when the
    # Translation API's isolation annotations are ergonomic. (See apple/README.md.)
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""

targets:
  Maat:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Maat
        # The App Intents extension principal compiles only into the extension target (#83); the rest of
        # Maat/ — including Maat/Shared, which the extension also pulls in — stays in the app.
        excludes:
          - "IntentsExtension/**"
    # Embed the App Intents extension so its launch-free intents ship inside the app (#83).
    dependencies:
      - target: MaatIntentsExtension
        embed: true
    settings:
      base:
        PRODUCT_NAME: Maat
        PRODUCT_BUNDLE_IDENTIFIER: dev.cauri.maat
        GENERATE_INFOPLIST_FILE: YES
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_KEY_CFBundleDisplayName: Maat
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.news"
        CODE_SIGN_STYLE: Automatic

  # App Intents extension (#83): the launch-free, data-returning intents (top story / search / add
  # topic / go deeper) run here, out of the app's process, so Siri / Shortcuts / Spotlight answer
  # in-place without launching the app. It shares Maat/Shared (models, on-device services, StoryEntity)
  # with the app and carries its own copy of the bundled feed/sources fixtures so it works offline.
  MaatIntentsExtension:
    # App Intents (ExtensionKit) extension — NOT a legacy PluginKit `app-extension`. This product type
    # makes XcodeGen embed the .appex into Maat.app/Extensions/ (not PlugIns/), so installd routes it
    # through ExtensionKit and honours the EXAppExtensionAttributes / com.apple.appintents-extension
    # point. Built as `app-extension` it lands in PlugIns/, where installd's PluginKit path demands a
    # legacy NSExtension dict and rejects the install (MIInstallerErrorDomain 39 / AppexBundleMissingNSExtensionDict).
    type: com.apple.product-type.extensionkit-extension
    supportedDestinations: [iOS, macOS]
    sources:
      - path: Maat/Shared
      - path: Maat/IntentsExtension
      - path: Maat/Resources/feed.fixture.json
      - path: Maat/Resources/sources.fixture.json
    settings:
      base:
        PRODUCT_NAME: MaatIntentsExtension
        PRODUCT_BUNDLE_IDENTIFIER: dev.cauri.maat.IntentsExtension
        # Explicit Info.plist (the App Intents extension point can't be expressed via INFOPLIST_KEY_*),
        # so don't also synthesise one.
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Maat/IntentsExtension/Info.plist
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
