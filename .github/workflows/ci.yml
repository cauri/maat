name: ci

on:
  push:
    branches: [main]
  pull_request:

# Deterministic gates only. Live-LLM evals run elsewhere (advisory + nightly), never
# on the merge gate — non-determinism must not own the merge button (DECISIONS D16).
jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test --all
      - run: cargo clippy --all-targets -- -D warnings

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run ruff check .
