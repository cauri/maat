name: ci

on:
  push:
    branches: [main]
  pull_request:

# Deterministic gates only. Live-LLM evals run elsewhere (advisory + nightly), never
# on the merge gate — non-determinism must not own the merge button (DECISIONS D16).
jobs:
  rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test --all
      - run: cargo clippy --all-targets -- -D warnings

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    # Postgres (pgvector) so the route integration harness runs on the gate, not just locally.
    # A DB is deterministic — D16's "no non-determinism on the merge button" is about live LLMs,
    # not infra — so this belongs on the gate (PLAN §7 wants integration coverage on CI).
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: maat
          POSTGRES_PASSWORD: maat
          POSTGRES_DB: maat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U maat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 12
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  # Push-to-deploy: only on main, only after the deterministic gates pass.
  # Deploys the infra baseline today; extends to the app image once it exists.
  deploy:
    needs: [rust, python]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Deploy stack over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          echo "$DEPLOY_SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude '.venv' --exclude '__pycache__' --exclude '.pytest_cache' --exclude '.ruff_cache' \
            python/ "root@$DEPLOY_HOST:/root/python/"
          # rust/ too: the prod compose builds maat-kerneld from ./rust (build: ./rust), so the box
          # needs the workspace source. Without this the kerneld image build fails on the box.
          rsync -az --delete -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new" \
            --exclude 'target' \
            rust/ "root@$DEPLOY_HOST:/root/rust/"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            deploy/docker-compose.prod.yml "root@$DEPLOY_HOST:/root/docker-compose.yml"
          # Caddyfile too: the admin-console vhost (D32) + the www.maat.press marketing vhost live
          # here; without this scp the box keeps a stale edge config after a deploy.
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            deploy/Caddyfile "root@$DEPLOY_HOST:/root/Caddyfile"
          # The Caddyfile is a mounted volume, so `compose up` does NOT reload Caddy — the caddy
          # container isn't recreated when only the mounted file changes, and it keeps serving the
          # old config (a new vhost would silently 404/TLS-error until a manual reload). So reload
          # it explicitly after the stack is up. `|| true` keeps the deploy green if caddy is mid
          # (re)start; the next deploy reloads again.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new "root@$DEPLOY_HOST" \
            'cd /root && docker compose up -d --build \
              && (docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile --adapter caddyfile || true) \
              && docker compose ps'
